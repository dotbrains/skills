name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to upload installer assets for
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Generate checksums
        run: |
          shasum -a 256 install.sh install.ps1 > checksums.txt

      - name: Upload installer assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: gh release upload "$TAG_NAME" install.sh install.ps1 checksums.txt --clobber
